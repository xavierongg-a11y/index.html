<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>境外 · EXP Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1d1610">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="境外">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Cinzel:wght@600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#120d0a;
    --bg-1:#1d1610;
    --crack:#2a1f17;
    --sand:#c9a876;
    --sand-dim:#8b6f47;
    --sand-bright:#e8c98a;
    --text:#e8dcc8;
    --text-dim:#9a8a6f;
    --blood:#8b2331;
    --blood-bright:#c4344a;
    --void:#5b3a8e;
    --void-bright:#8a5ec9;
    --easy:#5a7a52;
    --medium:#b8862b;
    --hard:#8b2331;
    --extreme:#c4344a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 800px at 50% -10%, rgba(91,58,142,0.12), transparent 60%),
      radial-gradient(ellipse 900px 600px at 90% 100%, rgba(139,35,49,0.10), transparent 60%),
      var(--bg-0);
    color:var(--text);
    font-family:'Noto Sans SC', sans-serif;
    min-height:100vh;
    padding:32px 16px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  .layout{display:flex; gap:24px; align-items:flex-start;}
  .main-col{flex:1; min-width:0;}

  /* ---------- rank sidebar ---------- */
  .rank-panel{
    width:240px; flex:0 0 240px;
    border:1px solid rgba(201,168,118,0.25);
    background:
      linear-gradient(180deg, rgba(42,31,23,0.6), rgba(18,13,10,0.9)),
      repeating-linear-gradient(115deg, rgba(0,0,0,0.15) 0 2px, transparent 2px 40px);
    border-radius:4px;
    padding:16px;
    position:sticky;
    top:24px;
    max-height:calc(100vh - 48px);
    overflow-y:auto;
  }
  .rank-panel-title{
    font-family:'Cinzel', serif;
    font-size:11px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--sand-dim);
    margin-bottom:12px;
  }
  .rank-step-head{
    font-family:'Noto Serif SC', serif;
    font-size:12px;
    color:var(--void-bright);
    letter-spacing:0.08em;
    margin:14px 0 6px;
    padding-bottom:4px;
    border-bottom:1px solid rgba(91,58,142,0.35);
  }
  .rank-step-head:first-child{margin-top:0;}
  .rank-item{
    font-size:12.5px;
    color:var(--text-dim);
    padding:4px 8px;
    border-radius:2px;
    margin-bottom:2px;
    letter-spacing:0.03em;
    display:flex; justify-content:space-between; gap:6px;
    transition:background 0.15s, color 0.15s;
  }
  .rank-item.reached{color:var(--sand);}
  .rank-item.current{
    color:var(--sand-bright);
    background:linear-gradient(90deg, rgba(91,58,142,0.35), rgba(196,52,74,0.18));
    font-weight:700;
    box-shadow:0 0 10px rgba(138,94,201,0.35) inset;
  }
  .rank-item .rlv{font-size:10px; color:inherit; opacity:0.6;}
  .rank-panel::-webkit-scrollbar{width:6px;}
  .rank-panel::-webkit-scrollbar-thumb{background:var(--sand-dim); border-radius:3px;}

  /* ---------- settings panel (left) ---------- */
  .settings-panel{
    width:240px; flex:0 0 240px;
    border:1px solid rgba(201,168,118,0.25);
    background:
      linear-gradient(180deg, rgba(42,31,23,0.6), rgba(18,13,10,0.9)),
      repeating-linear-gradient(115deg, rgba(0,0,0,0.15) 0 2px, transparent 2px 40px);
    border-radius:4px;
    padding:16px;
    position:sticky;
    top:24px;
  }
  .settings-panel-title{
    font-family:'Cinzel', serif;
    font-size:11px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--sand-dim);
    margin-bottom:4px;
  }
  .settings-panel-sub{
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:14px;
    line-height:1.4;
  }
  .default-row{
    margin-bottom:14px;
    padding-bottom:14px;
    border-bottom:1px solid rgba(201,168,118,0.12);
  }
  .default-row:last-of-type{border-bottom:none;}
  .default-row label{
    display:block;
    font-size:9.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .default-row input[type=text]{
    width:100%;
    background:var(--bg-0);
    border:1px solid rgba(201,168,118,0.25);
    color:var(--text);
    padding:7px 9px;
    border-radius:3px;
    font-family:'Noto Sans SC', sans-serif;
    font-size:12.5px;
    margin-bottom:6px;
  }
  .default-row input[type=text]:focus{outline:none; border-color:var(--sand-bright);}
  .default-row select{
    width:100%;
    font-size:12px;
    padding:6px 8px;
  }
  .settings-save{
    width:100%;
    margin-top:4px;
    font-size:11px;
    padding:8px;
  }
  .settings-status{
    font-size:10px;
    color:var(--easy);
    margin-top:8px;
    text-align:center;
    min-height:14px;
    opacity:0;
    transition:opacity 0.3s;
  }
  .settings-status.show{opacity:1;}

  @media (max-width: 1180px){
    .settings-panel{width:100%; flex:none; position:relative; top:0;}
  }

  @media (max-width: 880px){
    .layout{flex-direction:column;}
    .rank-panel{width:100%; flex:none; position:relative; top:0; max-height:320px;}
  }

  /* ---------- header / hero ---------- */
  .hero{
    position:relative;
    border:1px solid rgba(201,168,118,0.25);
    background:
      linear-gradient(180deg, rgba(42,31,23,0.6), rgba(18,13,10,0.9)),
      repeating-linear-gradient(115deg, rgba(0,0,0,0.15) 0 2px, transparent 2px 40px);
    border-radius:4px;
    padding:28px 28px 24px;
    margin-bottom:24px;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(circle at 80% 20%, rgba(139,35,49,0.18), transparent 50%);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'Cinzel', serif;
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--sand-dim);
  }
  .title-row{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:6px;}
  h1{
    font-family:'Noto Serif SC', serif;
    font-weight:900;
    font-size:30px;
    margin:0;
    color:var(--sand-bright);
    text-shadow:0 0 18px rgba(232,201,138,0.25);
    letter-spacing:0.04em;
  }
  .rank{
    font-family:'Noto Serif SC', serif;
    font-size:14px;
    color:var(--void-bright);
    letter-spacing:0.1em;
  }
  .stats-row{display:flex; gap:24px; margin-top:18px; flex-wrap:wrap;}
  .stat{min-width:90px;}
  .stat .num{font-family:'Cinzel', serif; font-size:26px; font-weight:800; color:var(--sand-bright);}
  .stat .lbl{font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-dim); margin-top:2px;}

  /* EXP bar — "fissure" style */
  .exp-shell{
    margin-top:18px;
    position:relative;
    height:22px;
    border-radius:3px;
    background:var(--crack);
    border:1px solid rgba(201,168,118,0.2);
    overflow:hidden;
    box-shadow:inset 0 2px 6px rgba(0,0,0,0.6);
  }
  .exp-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--void) 0%, var(--blood-bright) 60%, var(--sand-bright) 100%);
    box-shadow:0 0 14px rgba(138,94,201,0.6), 0 0 4px rgba(196,52,74,0.5);
    transition:width 0.6s cubic-bezier(.4,1.4,.4,1);
    position:relative;
  }
  .exp-fill::after{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 10px);
  }
  .exp-text{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; letter-spacing:0.08em; color:var(--text);
    text-shadow:0 1px 2px rgba(0,0,0,0.8);
  }

  /* ---------- sections ---------- */
  .section{margin-bottom:28px;}
  .section-head{
    display:flex; align-items:center; gap:10px; margin-bottom:12px;
  }
  .section-head h2{
    font-family:'Noto Serif SC', serif;
    font-size:16px; font-weight:600;
    color:var(--sand);
    letter-spacing:0.08em;
    margin:0;
  }
  .section-head::after{
    content:""; flex:1; height:1px;
    background:linear-gradient(90deg, rgba(201,168,118,0.4), transparent);
  }

  .task{
    display:flex; align-items:center; gap:12px;
    background:var(--bg-1);
    border:1px solid rgba(201,168,118,0.15);
    border-left:3px solid var(--sand-dim);
    border-radius:3px;
    padding:12px 14px;
    margin-bottom:8px;
    transition:background 0.2s, transform 0.15s;
  }
  .task.diff-easy{border-left-color:var(--easy);}
  .task.diff-medium{border-left-color:var(--medium);}
  .task.diff-hard{border-left-color:var(--hard);}
  .task.diff-extreme{border-left-color:var(--extreme); box-shadow:0 0 10px rgba(196,52,74,0.15);}
  .task.done{opacity:0.45;}
  .task.done .task-name{text-decoration:line-through;}
  .task:hover{transform:translateX(2px);}

  .check{
    width:22px; height:22px; flex:0 0 22px;
    border:2px solid var(--sand-dim);
    border-radius:3px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    color:var(--sand-bright);
    font-size:14px;
    transition:all 0.15s;
  }
  .check.checked{
    background:var(--sand-dim); border-color:var(--sand-bright);
  }
  .task-body{flex:1; min-width:0;}
  .task-name{font-size:14px; color:var(--text);}
  .task-meta{font-size:10px; color:var(--text-dim); margin-top:2px; letter-spacing:0.05em; display:flex; gap:8px;}
  .tag{
    font-size:10px; padding:2px 7px; border-radius:2px; letter-spacing:0.05em;
    text-transform:uppercase; font-weight:700;
  }
  .tag.diff-easy{background:rgba(90,122,82,0.2); color:#9cc28e;}
  .tag.diff-medium{background:rgba(184,134,43,0.2); color:#e0ad5c;}
  .tag.diff-hard{background:rgba(139,35,49,0.2); color:#e0768a;}
  .tag.diff-extreme{background:rgba(196,52,74,0.3); color:#ff8fa3; box-shadow:0 0 6px rgba(196,52,74,0.4);}
  .exp-pill{font-size:11px; color:var(--void-bright); font-weight:700;}
  .del-btn{
    background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:16px;
    padding:4px 6px; line-height:1; opacity:0.5; transition:opacity 0.15s, color 0.15s;
  }
  .del-btn:hover{opacity:1; color:var(--blood-bright);}

  .empty{
    color:var(--text-dim); font-size:13px; padding:18px; text-align:center;
    border:1px dashed rgba(201,168,118,0.2); border-radius:3px;
  }

  /* ---------- add form ---------- */
  .add-form{
    display:flex; gap:8px; flex-wrap:wrap;
    background:var(--bg-1);
    border:1px solid rgba(201,168,118,0.18);
    border-radius:4px;
    padding:14px;
  }
  .add-form input[type=text]{
    flex:1; min-width:160px;
    background:var(--bg-0);
    border:1px solid rgba(201,168,118,0.25);
    color:var(--text);
    padding:9px 11px;
    border-radius:3px;
    font-family:'Noto Sans SC', sans-serif;
    font-size:13px;
  }
  .add-form input[type=text]:focus{outline:none; border-color:var(--sand-bright);}
  select{
    background:var(--bg-0);
    border:1px solid rgba(201,168,118,0.25);
    color:var(--text);
    padding:9px 10px;
    border-radius:3px;
    font-size:13px;
  }
  .btn{
    background:var(--sand-dim);
    color:var(--bg-0);
    border:none;
    padding:9px 18px;
    border-radius:3px;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.04em;
    cursor:pointer;
    transition:background 0.15s, transform 0.1s;
  }
  .btn:hover{background:var(--sand-bright);}
  .btn:active{transform:scale(0.97);}

  footer{
    text-align:center; color:var(--text-dim); font-size:11px; margin-top:30px; letter-spacing:0.05em;
  }

  /* ---------- level up flash ---------- */
  .levelup-flash{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:radial-gradient(circle at 50% 40%, rgba(138,94,201,0.35), rgba(196,52,74,0.15) 40%, transparent 70%);
    opacity:0; transition:opacity 0.4s;
  }
  .levelup-flash.show{opacity:1; animation:flashpulse 1.1s ease-out;}
  @keyframes flashpulse{
    0%{opacity:0;}
    15%{opacity:1;}
    100%{opacity:0;}
  }
  .levelup-banner{
    position:fixed; top:18%; left:50%; transform:translate(-50%,-20px);
    z-index:51; opacity:0; pointer-events:none;
    font-family:'Noto Serif SC', serif;
    font-size:22px; font-weight:900;
    color:var(--sand-bright);
    text-shadow:0 0 24px rgba(138,94,201,0.9), 0 0 8px rgba(196,52,74,0.7);
    letter-spacing:0.15em;
    text-align:center;
    transition:opacity 0.4s, transform 0.4s;
  }
  .levelup-banner.show{opacity:1; transform:translate(-50%,0);}

  @media (prefers-reduced-motion: reduce){
    .task, .exp-fill, .levelup-flash, .levelup-banner{transition:none !important; animation:none !important;}
  }
</style>
</head>
<body>

<div class="levelup-flash" id="flash"></div>
<div class="levelup-banner" id="banner"></div>

<div class="wrap">
<div class="layout">

<div class="settings-panel" id="settingsPanel">
  <div class="settings-panel-title">默认设置 · Defaults</div>
  <div class="settings-panel-sub">Edit the 3 starter Daily Habits used whenever you reset progress.</div>
  <div id="defaultsForm"></div>
  <button class="btn settings-save" id="saveDefaultsBtn">Save Defaults</button>
  <div class="settings-status" id="settingsStatus">Saved</div>
</div>

<div class="main-col">

  <div class="hero">
    <div class="eyebrow">境 · 外 · 修 行 录</div>
    <div class="title-row">
      <h1 id="rankTitle">拾荒者</h1>
      <div class="rank">LV <span id="levelNum">0</span></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="num" id="totalExp">0</div><div class="lbl">Total EXP</div></div>
      <div class="stat"><div class="num" id="todayExp">0</div><div class="lbl">Earned Today</div></div>
      <div class="stat"><div class="num" id="streakNum">0</div><div class="lbl">Day Streak</div></div>
    </div>
    <div class="exp-shell">
      <div class="exp-fill" id="expFill"></div>
      <div class="exp-text" id="expText">0 / 100</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><h2>日常 · Daily Habits</h2></div>
    <div id="dailyList"></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>事项 · One-Time Tasks</h2></div>
    <div id="onceList"></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>新增 · Add Task</h2></div>
    <div class="add-form">
      <input type="text" id="taskNameInput" placeholder="Task name, e.g. 50 push-ups">
      <select id="diffSelect">
        <option value="easy">Easy · +10</option>
        <option value="medium" selected>Medium · +25</option>
        <option value="hard">Hard · +50</option>
        <option value="extreme">Extreme · +75</option>
      </select>
      <select id="typeSelect">
        <option value="daily">Daily (resets each day)</option>
        <option value="once">One-time</option>
      </select>
      <button class="btn" id="addBtn">Add</button>
    </div>
  </div>

  <footer>
    境外 EXP TRACKER · progress saved automatically
    <div style="margin-top:10px;">
      <button class="btn" id="resetBtn" style="background:var(--blood); color:var(--text); padding:7px 16px; font-size:11px;">Reset All Progress</button>
    </div>
  </footer>

</div>

<div class="rank-panel" id="rankPanel">
  <div class="rank-panel-title">境界 · Cultivation Stages</div>
  <div id="rankList"></div>
</div>

</div>
</div>

<script>
const DIFF = {
  easy:    { label:'Easy',    exp:10 },
  medium:  { label:'Medium',  exp:25 },
  hard:    { label:'Hard',    exp:50 },
  extreme: { label:'Extreme', exp:75 }
};

// Each step group: { step:'第一步 (First Step)', stages:[ [4 sub-titles], [4 sub-titles], ... ] }
const RANK_GROUPS = [
  { step:'第一步', stepEn:'First Step', stages:[
    ['凝气初期','凝气中期','凝气后期','凝气大圆满'],
    ['筑基初期','筑基中期','筑基后期','筑基大圆满'],
    ['结丹初期','结丹中期','结丹后期','结丹大圆满'],
    ['元婴初期','元婴中期','元婴后期','元婴大圆满'],
    ['化神初期','化神中期','化神后期','化神大圆满'],
    ['婴变初期','婴变中期','婴变后期','婴变大圆满'],
    ['问鼎初期','问鼎中期','问鼎后期','问鼎大圆满']
  ]},
  { step:'第二步', stepEn:'Second Step', stages:[
    ['阴虚初期','阴虚中期','阴虚后期','阴虚大圆满'],
    ['阳实初期','阳实中期','阳实后期','阳实大圆满'],
    ['碎涅初期','碎涅中期','碎涅后期','碎涅大圆满'],
    ['净涅初期','净涅中期','净涅后期','净涅大圆满'],
    ['空涅初期','空涅中期','空涅后期','空涅大圆满']
  ]},
  { step:'第三步', stepEn:'Third Step', stages:[
    ['踏天初期','踏天中期','踏天后期','踏天大圆满']
  ]}
];

// Flatten into a single ordered list of titles, each assigned a sequential level threshold (0,1,2,...)
const RANKS = [];
(function buildRanks(){
  let lv = 0;
  RANK_GROUPS.forEach(g=>{
    g.stages.forEach(stage=>{
      stage.forEach(title=>{
        RANKS.push({lv, title, step:g.step});
        lv++;
      });
    });
  });
})();

function rankFor(level){
  let r = RANKS[0];
  for(const x of RANKS){ if(level >= x.lv) r = x; }
  return r.title;
}

// EXP needed to go from level L to L+1 (scaling curve)
function expForLevel(level){
  return Math.round(800 * Math.pow(1.18, level));
}

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

let state = {
  totalExp: 0,
  level: 0,
  tasks: [],          // {id, name, diff, type:'daily'|'once', done(once only)}
  dailyDoneDate: {},  // taskId -> dateString of last completion
  streak: 0,
  lastActiveDate: null,
  expLog: {},         // dateString -> exp earned that day
  defaultDailies: [
    {name:'Pull-up practice', diff:'medium'},
    {name:'Read 10 pages', diff:'easy'},
    {name:'Post one piece of content', diff:'hard'}
  ]
};

const STORAGE_KEY = 'exp-tracker-state';

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      const defaults = state.defaultDailies;
      state = Object.assign(state, parsed);
      if(!parsed.defaultDailies) state.defaultDailies = defaults;
    } else {
      seedDefaults();
    }
  }catch(e){
    seedDefaults();
  }
  updateStreak();
  renderDefaultsForm();
  render();
}

function seedDefaults(){
  state.tasks = state.defaultDailies.map(d => ({
    id: cryptoId(),
    name: d.name,
    diff: d.diff,
    type: 'daily'
  }));
}

function cryptoId(){
  return 'id-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

async function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('save failed', e);
  }
}

function updateStreak(){
  const today = todayKey();
  if(state.lastActiveDate === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yKey = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  if(state.lastActiveDate === yKey){
    // continued yesterday -> streak preserved, increments on first completion today
  } else if(state.lastActiveDate !== null) {
    state.streak = 0;
  }
}

function addExp(amount){
  state.totalExp += amount;
  const today = todayKey();
  state.expLog[today] = (state.expLog[today]||0) + amount;

  if(state.lastActiveDate !== today){
    const y = new Date(); y.setDate(y.getDate()-1);
    const yKey = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
    state.streak = (state.lastActiveDate === yKey) ? state.streak + 1 : 1;
    state.lastActiveDate = today;
  }

  let leveled = false;
  while(state.totalExpIntoLevel() >= expForLevel(state.level)){
    leveled = true;
    state.level += 1;
  }
  if(leveled) triggerLevelUp();
}

// running exp spent toward current level — computed from totalExp minus exp consumed by previous levels
state.totalExpIntoLevel = function(){
  let consumed = 0;
  for(let i=0;i<this.level;i++) consumed += expForLevel(i);
  return this.totalExp - consumed;
};

function triggerLevelUp(){
  const flash = document.getElementById('flash');
  const banner = document.getElementById('banner');
  banner.textContent = '突 破 ! LEVEL ' + state.level;
  flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), 1600);
}

function completeTask(task){
  const exp = DIFF[task.diff].exp;
  if(task.type === 'daily'){
    const today = todayKey();
    if(state.dailyDoneDate[task.id] === today){
      // un-complete
      delete state.dailyDoneDate[task.id];
      state.totalExp = Math.max(0, state.totalExp - exp);
      recalcLevelDown();
    } else {
      state.dailyDoneDate[task.id] = today;
      addExp(exp);
    }
  } else {
    if(task.done){
      task.done = false;
      state.totalExp = Math.max(0, state.totalExp - exp);
      recalcLevelDown();
    } else {
      task.done = true;
      addExp(exp);
    }
  }
  saveState();
  render();
}

function recalcLevelDown(){
  // ensure level matches totalExp after a manual uncheck
  while(state.level > 0 && state.totalExpIntoLevel() < 0){
    state.level -= 1;
  }
}

function deleteTask(id){
  state.tasks = state.tasks.filter(t => t.id !== id);
  delete state.dailyDoneDate[id];
  saveState();
  render();
}

function addTask(){
  const nameInput = document.getElementById('taskNameInput');
  const diffSelect = document.getElementById('diffSelect');
  const typeSelect = document.getElementById('typeSelect');
  const name = nameInput.value.trim();
  if(!name) return;
  state.tasks.push({
    id: cryptoId(),
    name,
    diff: diffSelect.value,
    type: typeSelect.value,
    done: false
  });
  nameInput.value = '';
  saveState();
  render();
}

function taskRow(t){
  const today = todayKey();
  const isDone = t.type === 'daily' ? state.dailyDoneDate[t.id] === today : !!t.done;
  const exp = DIFF[t.diff].exp;
  const div = document.createElement('div');
  div.className = 'task diff-' + t.diff + (isDone ? ' done' : '');
  div.innerHTML = `
    <div class="check ${isDone?'checked':''}" data-id="${t.id}">${isDone?'✓':''}</div>
    <div class="task-body">
      <div class="task-name">${escapeHtml(t.name)}</div>
      <div class="task-meta">
        <span class="tag diff-${t.diff}">${DIFF[t.diff].label}</span>
        <span class="exp-pill">+${exp} EXP</span>
      </div>
    </div>
    <button class="del-btn" data-del="${t.id}" title="Remove task">✕</button>
  `;
  return div;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let lastScrolledLevel = null;

function renderRankPanel(){
  const panel = document.getElementById('rankPanel');
  const list = document.getElementById('rankList');
  list.innerHTML = '';
  let lastStep = null;
  let currentEl = null;
  RANKS.forEach(r=>{
    if(r.step !== lastStep){
      const head = document.createElement('div');
      head.className = 'rank-step-head';
      head.textContent = r.step;
      list.appendChild(head);
      lastStep = r.step;
    }
    const item = document.createElement('div');
    const isCurrent = r.lv === state.level || (state.level >= RANKS[RANKS.length-1].lv && r.lv === RANKS[RANKS.length-1].lv);
    let cls = 'rank-item';
    if(r.lv <= state.level) cls += ' reached';
    if(isCurrent) cls += ' current';
    item.className = cls;
    item.innerHTML = `<span>${r.title}</span><span class="rlv">Lv${r.lv}</span>`;
    list.appendChild(item);
    if(isCurrent) currentEl = item;
  });
  if(currentEl && lastScrolledLevel !== state.level){
    lastScrolledLevel = state.level;
    const targetTop = currentEl.offsetTop - (panel.clientHeight / 2) + (currentEl.clientHeight / 2);
    panel.scrollTop = Math.max(0, targetTop);
  }
}

function render(){
  document.getElementById('levelNum').textContent = state.level;
  document.getElementById('rankTitle').textContent = rankFor(state.level);
  document.getElementById('totalExp').textContent = state.totalExp;
  document.getElementById('streakNum').textContent = state.streak;
  document.getElementById('todayExp').textContent = state.expLog[todayKey()] || 0;

  const into = Math.max(0, state.totalExpIntoLevel());
  const need = expForLevel(state.level);
  const pct = Math.min(100, Math.round((into/need)*100));
  document.getElementById('expFill').style.width = pct + '%';
  document.getElementById('expText').textContent = into + ' / ' + need;

  const dailyList = document.getElementById('dailyList');
  const onceList = document.getElementById('onceList');
  dailyList.innerHTML = '';
  onceList.innerHTML = '';

  const dailies = state.tasks.filter(t => t.type === 'daily');
  const onces = state.tasks.filter(t => t.type === 'once');

  if(dailies.length === 0){
    dailyList.innerHTML = '<div class="empty">No daily habits yet — add one below.</div>';
  } else {
    dailies.forEach(t => dailyList.appendChild(taskRow(t)));
  }

  if(onces.length === 0){
    onceList.innerHTML = '<div class="empty">No one-time tasks yet.</div>';
  } else {
    onces.forEach(t => onceList.appendChild(taskRow(t)));
  }

  document.querySelectorAll('.check').forEach(el=>{
    el.onclick = () => {
      const t = state.tasks.find(x=>x.id===el.dataset.id);
      if(t) completeTask(t);
    };
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.onclick = () => deleteTask(el.dataset.del);
  });

  renderRankPanel();
}

function renderDefaultsForm(){
  const form = document.getElementById('defaultsForm');
  form.innerHTML = '';
  state.defaultDailies.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'default-row';
    const diffOptions = Object.keys(DIFF).map(k =>
      `<option value="${k}" ${k===d.diff?'selected':''}>${DIFF[k].label} · +${DIFF[k].exp}</option>`
    ).join('');
    row.innerHTML = `
      <label>Habit ${i+1}</label>
      <input type="text" class="def-name" data-idx="${i}" value="${d.name.replace(/"/g,'&quot;')}">
      <select class="def-diff" data-idx="${i}">${diffOptions}</select>
    `;
    form.appendChild(row);
  });
}

document.getElementById('saveDefaultsBtn').onclick = async () => {
  const names = document.querySelectorAll('.def-name');
  const diffs = document.querySelectorAll('.def-diff');
  names.forEach(input => {
    const i = parseInt(input.dataset.idx, 10);
    const val = input.value.trim();
    if(val) state.defaultDailies[i].name = val;
  });
  diffs.forEach(sel => {
    const i = parseInt(sel.dataset.idx, 10);
    state.defaultDailies[i].diff = sel.value;
  });
  await saveState();
  const status = document.getElementById('settingsStatus');
  status.textContent = 'Defaults saved';
  status.classList.add('show');
  setTimeout(()=>status.classList.remove('show'), 1600);
};

document.getElementById('resetBtn').onclick = async () => {
  if(!confirm('Reset all progress? This clears your level, EXP, streak, and all tasks. This cannot be undone.')) return;
  const keepDefaults = state.defaultDailies;
  state = {
    totalExp: 0,
    level: 0,
    tasks: [],
    dailyDoneDate: {},
    streak: 0,
    lastActiveDate: null,
    expLog: {},
    defaultDailies: keepDefaults
  };
  state.totalExpIntoLevel = function(){
    let consumed = 0;
    for(let i=0;i<this.level;i++) consumed += expForLevel(i);
    return this.totalExp - consumed;
  };
  seedDefaults();
  await saveState();
  render();
};

document.getElementById('addBtn').onclick = addTask;
document.getElementById('taskNameInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') addTask();
});

loadState();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
